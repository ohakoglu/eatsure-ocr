<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
  <title>EatSure OCR</title>
</head>
<body>
  <main class="wrap">
    <h1>EatSure OCR</h1>

    <section class="card">
      <label class="label">Backend URL</label>
      <div class="row">
        <input id="backendUrl" class="input" placeholder="https://...onrender.com" />
        <button id="saveBackend" class="btn">Kaydet</button>
      </div>
      <div class="row">
        <button id="checkHealth" class="btn btn-secondary">Health Kontrol</button>
        <span id="healthResult" class="muted"></span>
      </div>
    </section>

    <section class="card">
      <label class="label">Etiket fotoğrafı</label>

      <!-- iOS için: capture YOK -->
      <input
        id="fileInput"
        type="file"
        accept="image/*"
        class="file"
      />

      <div class="row">
        <button id="runOcr" class="btn">OCR Başlat</button>
        <button id="sendToBackend" class="btn btn-secondary">Analiz Et</button>
      </div>

      <div class="preview">
        <img id="previewImg" alt="" />
      </div>

      <label class="label">OCR Metni</label>
      <textarea id="ocrText" class="textarea" rows="10" placeholder="OCR sonucu burada..."></textarea>

      <label class="label">Sonuç</label>
      <pre id="result" class="pre"></pre>
    </section>

    <p class="muted small">
      Not: iOS’ta fotoğraf seçimi için input’ta <b>capture</b> olmamalı.
    </p>
  </main>

  <!-- ✅ Tesseract.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

  <!-- ✅ Cache-bypass -->
  <script src="app.js?v=7"></script>
</body>
</html>
